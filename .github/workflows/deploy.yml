name: Deploy to Production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate:
    name: Build validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy via SSH
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            cd /QTNuxtProject

            # Nuxt 4 requires Node 18+; the box's system Node may still be on an
            # older version installed for the previous Express-based app. Load nvm
            # if present so this deploy always builds/runs under Node 20 regardless
            # of what the shell's default `node` resolves to.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" && nvm use 20

            restart_app() {
              pm2 delete ecosystem.config.cjs 2>/dev/null || true
              if command -v fuser >/dev/null 2>&1; then
                fuser -k 3000/tcp 2>/dev/null || true
              elif command -v lsof >/dev/null 2>&1; then
                lsof -ti tcp:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
              fi
              sleep 2
              pm2 start ecosystem.config.cjs
            }

            PREV=$(git rev-parse HEAD)
            git fetch --prune origin master
            git reset --hard origin/master
            npm ci
            npm run build
            restart_app
            sleep 5
            # No more -k/https here: Nitro serves plain HTTP on 3000, with nginx
            # terminating TLS in front of it (see docs/migration-plan.md Phase 6) -
            # the old app terminated HTTPS itself in-process, this one doesn't.
            if ! curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              echo "Health check failed, rolling back to $PREV"
              git reset --hard "$PREV"
              npm ci
              npm run build
              restart_app
              exit 1
            fi
            echo "Deploy successful at $(git rev-parse --short HEAD)"
