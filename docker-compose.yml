services:
  mongo:
    image: mongo:6
    container_name: qtapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: qtapp
    volumes:
      - qtapp-mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

volumes:
  qtapp-mongo-data:
